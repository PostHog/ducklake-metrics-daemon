# Build and publish the daemon container image to GitHub Container Registry.
#
# - PRs: build only (validates the Dockerfile + multi-stage build).
# - Push to main: build + push, tagged `latest` + `sha-<short>` + full sha.
# - Tag push (vX.Y.Z): build + push, tagged with the semver.
#
# Targets EKS arm64 (Graviton) nodes only. The builder stage cross-compiles
# via Go's native GOOS/GOARCH — no QEMU emulation, so a plain amd64 runner
# is fine. If you ever need amd64 for local dev, build with
# `docker buildx build --platform linux/amd64 .` locally.
#
# GHCR push uses the ephemeral GITHUB_TOKEN; the image inherits the repo's
# public visibility, so no pull-secrets are needed for anonymous pull.
#
# Per PostHog org policy, every `uses:` is pinned to a full commit SHA
# with the human-readable version as a trailing comment.

name: Container Image CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so `git describe` works for VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/posthog/ducklake-metrics-daemon
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute VERSION
        id: version
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
