# Build and publish the daemon container image to GitHub Container Registry.
#
# - PRs: build only (validates the Dockerfile + multi-stage build).
# - Push to main: build + push, tagged `latest` + `sha-<short>` + full sha.
# - Tag push (vX.Y.Z): build + push, tagged with the semver.
#
# Targets EKS arm64 (Graviton) nodes only. The builder stage cross-compiles
# via Go's native GOOS/GOARCH — no QEMU emulation, so a plain amd64 runner
# is fine. If you ever need amd64 for local dev, build with
# `docker buildx build --platform linux/amd64 .` locally.
#
# GHCR push uses the ephemeral GITHUB_TOKEN; the image inherits the repo's
# public visibility, so no pull-secrets are needed for anonymous pull.
#
# Per PostHog org policy, every `uses:` is pinned to a full commit SHA
# with the human-readable version as a trailing comment.

name: Container Image CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so `git describe` works for VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/posthog/ducklake-metrics-daemon
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute VERSION
        id: version
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      # OCI index digest ("sha256:<64-hex>") of the pushed image; consumed by
      # dispatch_state_update to build the pinned image ref for charts state.
      digest: ${{ steps.build.outputs.digest }}

  # Update charts state (image.dev / image.sha) on every merge to main —
  # matches the house pattern (duckgres/posthog "Container Image CD"): a
  # merge auto-lands in state, and prod stays a manual promote via charts'
  # Promote-to-Prod workflow, gated by `require_prod_approval: true` in
  # charts/state/ducklake-metrics-daemon.yaml. Runs on push-to-main and on
  # manual workflow_dispatch; the ref guard excludes PRs and tag pushes.
  # (Previously gated to workflow_dispatch only, which diverged from every
  # other repo and surprised operators — a merge built the image but never
  # wrote state, so promote-to-prod rejected the never-in-state ref.)
  dispatch_state_update:
    name: Dispatch state update to charts
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Get deployer token
        id: deployer
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_CHARTS_DEPLOYER_APP_ID }}
          private-key: ${{ secrets.GH_APP_CHARTS_DEPLOYER_PRIVATE_KEY }}
          owner: PostHog
          repositories: charts

      - name: Trigger charts state update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.deployer.outputs.token }}
          repository: PostHog/charts
          event-type: commit_state_update
          # image.sha uses the pinned <full-git-sha>@sha256:<digest> form (the
          # full sha is a pushed tag; the digest pins the exact index). This is
          # the form charts' promote-to-prod validates against — its image-ref
          # regex rejects the short "sha-<7hex>" tag form, and its
          # never-appeared-in-state-history check means only refs written here
          # can ever be promoted to prod.
          client-payload: |
            {
              "values": {
                "image": {
                  "sha": "${{ github.sha }}@${{ needs.build.outputs.digest }}"
                }
              },
              "release": "ducklake-metrics-daemon",
              "commit": ${{ toJson(github.event.head_commit) }},
              "repository": ${{ toJson(github.repository) }},
              "labels": [],
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }
