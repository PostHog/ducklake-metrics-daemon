version: 2
updates:
  # Go module deps. Weekly batched PRs.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    # Wait 7 days before bumping to a newly published version — supply-
    # chain defense against malicious or unstable just-published releases.
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - go

  # GitHub Actions: open-pull-requests-limit=0 keeps the ecosystem
  # registered so security advisories still trigger PRs, but suppresses
  # weekly proactive bumps. Matches posthog/.github/dependabot.yml.
  # Reason: PostHog org policy requires every action pinned to a full
  # commit SHA; Dependabot's default bump points at version tags
  # (e.g. @v7) which fails the org's pre-job action allowlist. Manual
  # SHA bumps as needed instead.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github-actions

  # Dockerfile base image bumps (golang:alpine, distroless, busybox).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - docker
