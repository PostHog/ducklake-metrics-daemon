version: 2
updates:
  # Go module deps. Weekly batched PRs.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go

  # GitHub Actions workflow pinning. Same cadence; security updates
  # auto-merge via Dependabot's standard PR flow.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # Dockerfile base image bumps (golang:alpine, distroless, busybox).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
